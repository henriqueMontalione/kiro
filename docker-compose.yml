version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: kiro_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Healthcheck lets `backend` wait until Postgres is actually accepting
    # connections, not just until the container has started.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 3s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer
    container_name: kiro_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kiro_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      PORT: 8000
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      PRIVY_APP_ID: ${VITE_PRIVY_APP_ID}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      PII_MASTER_KEY: ${PII_MASTER_KEY}
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
